<app-loading-screen></app-loading-screen>
<app-scroll-progress></app-scroll-progress>
<app-floating-action-button></app-floating-action-button>
<app-particle-effects></app-particle-effects>

<div class="background">
  <div class="nav-bar" [class.hidden]="isBarHidden">
    <div class="top-bar">
      <h3 class="name-header">Evan Goldman</h3>
      <div class="flex items-center space-x-4">
        <button
          (click)="toggleTheme()"
          class="theme-toggle group p-2 rounded-xl transition-all duration-300 hover:scale-110 hover:shadow-lg border border-gray-700 hover:border-primary-500"
          [attr.aria-label]="currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
          data-aos="fade-in" data-aos-delay="200">
          <svg *ngIf="currentTheme === 'dark'" class="w-5 h-5 text-yellow-400 group-hover:text-yellow-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
          <svg *ngIf="currentTheme === 'light'" class="w-5 h-5 text-gray-400 group-hover:text-gray-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
        </button>
        <button class="hamburger" (click)="toggleMenu()">&#9776;</button>
      </div>
    </div>
    <nav class="nav-header" [class.open]="isMenuOpen">
      <div *ngFor="let anchor of anchors">
        <a (click)="scrollToSection(anchor.name)">
          <h3 class="nav-item">{{ anchor.name }}</h3>
        </a>
      </div>
    </nav>
  </div>

  <router-outlet></router-outlet>
</div>
