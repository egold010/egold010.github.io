<div class="container">
    <h1 appReveal appDecode>Career</h1>
    <div class="timeline-container">
        <div class="timeline-entry" *ngFor="let item of timeline; let i = index">
            <div class="timeline-dot"></div>
            <img [src]="item.image" alt="" aria-hidden="true" class="timeline-icon" loading="lazy" />
            <div class="timeline-content glass" appTilt [tiltMax]="2">
                <h3>
                    {{ item.title }}
                    <span class="company-name"> &#64;<a class="company-link" [href]="item.link" target="_blank">{{ item.company }}</a></span>
                </h3>
                <span class="timeline-date">{{ item.date }}</span>
                <p>{{ item.description }}</p>
                <div class="skills" *ngIf="item.skills?.length">
                    <span *ngFor="let skill of item.skills" class="skill-pill" appRepel [repelRadius]="60" [repelForce]="0.4">{{ skill }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
