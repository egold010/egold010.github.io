<div class="container">
    <div class="background-glow"></div>
    <div class="content-wrapper">
        <div class="left-side" [style.transform]="'translate3d(' + mouseX * -1.5 + 'px, ' + mouseY * -1.5 + 'px, 0)'" style="transition: transform 0.1s ease-out;">
            <div class="image-container" appTilt [tiltMax]="15">
                <div class="hologram-overlay"></div>
                <img src="assets/evan.jpg" alt="Evan Goldman Headshot" class="animate-fade-in glitch-image">
                <div class="image-glow"></div>
            </div>
        </div>
        
        <div class="right-side" [style.transform]="'translate3d(' + mouseX * 1.5 + 'px, ' + mouseY * 1.5 + 'px, 0)'" style="transition: transform 0.1s ease-out;">
            <h1 class="animate-slide-up headline" style="animation-delay: 0.2s;">
                Hello, I'm <span class="gradient-text glitch-text" data-text="Evan">Evan</span>
            </h1>
            <h2 class="animate-slide-up subheadline" style="animation-delay: 0.4s; min-height: 3rem;">
                {{ currentPhrase }}<span class="blinking-cursor">|</span>
            </h2>
            <p class="animate-slide-up description" style="animation-delay: 0.6s;">
                Welcome to my portfolio! I build intelligent systems that bridge the gap between software and the physical world.
            </p>
            <div class="button-container animate-slide-up" style="animation-delay: 0.8s;">
                <a appMagnetic [magneticPull]="0.6" href="https://www.linkedin.com/in/egold018/" target="_blank" class="social-btn">
                    <img src="assets/linkedin-icon.png" alt="LinkedIn Profile">
                </a>
                <a appMagnetic [magneticPull]="0.6" href="https://github.com/egold010?tab=repositories" target="_blank" class="social-btn">
                    <img src="assets/github-icon.png" alt="GitHub Profile">
                </a>
                <a appMagnetic [magneticPull]="0.6" href="mailto:evangoldman10@gmail.com" target="_blank" class="social-btn">
                    <img src="assets/mail-icon.png" alt="Email Address">
                </a>
            </div>
            
            <div class="hero-console animate-slide-up" style="animation-delay: 1.1s;" appTilt [tiltMax]="5" appDraggable (click)="focusTerminal()">
                <div class="console-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="console-title">zsh - evan@portfolio</span>
                </div>
                <div class="console-body" #consoleBody>
                    <p class="console-line"><span class="prompt">~ %</span> ./init_autonomous_agent.sh</p>
                    <p class="console-line success">[OK] Sensors Calibrated</p>
                    <p class="console-line success">[OK] Neural Network Loaded</p>
                    
                    <ng-container *ngFor="let line of terminalHistory">
                        <p class="console-line" [ngClass]="line.type">
                            <span *ngIf="line.type === 'input'" class="prompt">~ %</span>
                            <span>{{ line.text }}</span>
                        </p>
                    </ng-container>
                    
                    <div class="console-input-wrapper">
                        <span class="prompt">~ %</span>
                        <input type="text" 
                               class="console-input" 
                               (keydown.enter)="processCommand($event)"
                               #terminalInput
                               autocomplete="off" 
                               spellcheck="false">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="scroll-indicator animate-fade-in" style="animation-delay: 1.5s;">
        <img src="assets/arrow_down.png" alt="Scroll Down" aria-hidden="true" class="animate-bounce">
    </div>
</div>
