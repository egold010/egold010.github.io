<section class="container">
    <h1>Relevant Coursework</h1>
    <div class="coursework-columns">
        <div class="course-category">
            <h3>Graduate</h3>
            <div class="course-grid">
                <div class="course-card" *ngFor="let course of coursework.graduate; let i = index"
                    [style.animation-delay]="(i * 50) + 'ms'">{{ course }}</div>
            </div>
        </div>
        <div class="course-category">
            <h3>Undergrad</h3>
            <div class="course-grid">
                <div class="course-card" *ngFor="let course of coursework.undergrad; let i = index"
                    [style.animation-delay]="(i * 50) + 'ms'">{{ course }}</div>
            </div>
        </div>
    </div>
</section>
