name: Deploy site (cursed + portfolio)

# Builds BOTH branches into a single GitHub Pages output:
#   /            -> gemini branch (the "cursed" YouTube site)
#   /portfolio/  -> main branch   (the real portfolio)
# A push to either branch rebuilds and redeploys the whole combined site.
# If a build fails, nothing is deployed, so the live site is never left broken.

on:
  push:
    branches: [gemini, main]
  workflow_dispatch:

permissions:
  contents: write

# Never run two deploys at once (a push to gemini + a push to main are serialized).
concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cursed site (gemini)
        uses: actions/checkout@v4
        with:
          ref: gemini
          path: gemini

      - name: Checkout portfolio (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build cursed site -> root (base-href /)
        working-directory: gemini/Source
        run: |
          npm ci
          npx ng build --configuration production --base-href=/

      - name: Build portfolio -> /portfolio/ (base-href /portfolio/)
        working-directory: main/Source
        run: |
          npm ci
          npx ng build --configuration production --base-href=/portfolio/

      - name: Assemble combined output
        run: |
          set -e
          rm -rf out
          mkdir -p out
          # cursed site at the root
          cp -a gemini/Source/dist/website/. out/
          # portfolio under /portfolio/
          mkdir -p out/portfolio
          cp -a main/Source/dist/website/. out/portfolio/
          # custom domain
          echo "evan-goldman.com" > out/CNAME
          # SPA deep-link fallback for the root (cursed) app's path-based routes
          cp out/index.html out/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy combined site (cursed + /portfolio) [skip ci]'
